name: ai_code_reviewer
description: AI-powered code review tool for mobile developers

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  camera: ^0.10.0
  google_mlkit_text_recognition: ^0.10.0
  http: ^1.1.0
  provider: ^6.0.0
  shared_preferences: ^2.2.0
  flutter_markdown: ^0.6.0
  image_picker: ^1.0.0
  path_provider: ^2.1.0
  intl: ^0.18.0
  flutter_dotenv: ^5.1.0
  local_auth: ^2.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
