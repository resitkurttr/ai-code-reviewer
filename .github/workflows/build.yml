name: Build and Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Init Flutter project
        run: flutter create --org com.resitkurt --project-name ai_code_reviewer .

      - name: Fix asset directories
        run: mkdir -p assets/images assets/icons && touch assets/images/.gitkeep assets/icons/.gitkeep

      - name: Fix Kotlin version
        run: |
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.0"/' android/build.gradle
          sed -i 's/org.jetbrains.kotlin:kotlin-stdlib.*:/org.jetbrains.kotlin:kotlin-stdlib:1.9.0/' android/build.gradle

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-builds
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*-release.apk
          generate_release_notes: true
          body: |
            ## AI Code Reviewer v1.0.0

            ozellikler:
            - Groq API entegrasyonu
            - Kod fotograf ile analiz
            - 8+ dil destegi
            - Dark mode tema
            - Guvenli API key saklama

            Kurulum:
            ```bash
            git clone https://github.com/resitkurttr/ai-code-reviewer.git
            cd ai-code-reviewer
            flutter pub get
            flutter run
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
