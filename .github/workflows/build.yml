name: Build and Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Init Flutter project
        run: flutter create --org com.resitkurt --project-name ai_code_reviewer .

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub || true

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-builds
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*-release.apk
          generate_release_notes: true
          body: |
            ## AI Code Reviewer v1.0.0
            
            Yeni özellikler:
            - Groq API entegrasyonu
            - Kod fotoğrafı ile analiz
            - 8+ dil desteği
            - Dark mode tema
            - Güvenli API key saklama
            
            Kurulum:
            ```bash
            git clone https://github.com/resitkurttr/ai-code-reviewer.git
            cd ai-code-reviewer
            flutter pub get
            flutter run
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
